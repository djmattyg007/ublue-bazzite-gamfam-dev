---
name: "Config checks"

on:
  push:
    branches:
      - "**"
  pull_request: ~

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test-config:
    name: "Test configuration"
    runs-on: "ubuntu-latest"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
        with:
          persist-credentials: false

      - name: "Run actionlint"
        uses: "reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d" # v1.72.0
        with:
          fail_level: "warning"

      - name: "Run zizmor"
        uses: "zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d" # v0.5.6
        with:
          advanced-security: false
          annotations: true

      - name: "Run gitleaks"
        uses: "reviewdog/action-gitleaks@2b7b5685e3e3eecddab5d30cfa04f18123031421" # v1.8.0
        with:
          fail_level: "warning"

      - name: "Check Renovatebot config"
        uses: "docker://ghcr.io/renovatebot/renovate@sha256:0c8122ec80a90963fde9609d5b8396a4fcafa53504ebf5ac32ff8097c2f05f98" # v43.177
        with:
          args: "renovate-config-validator --strict"

      - name: "Run shellcheck"
        uses: "reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e" # v1.32.0
        with:
          fail_level: "info"
          shellcheck_flags: ""
